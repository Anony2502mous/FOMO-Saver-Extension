<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FOMO Saver Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1>⚡ FOMO Saver — Settings</h1>

    <div class="card">
      <h2>🤖 AI Provider</h2>
      <label>Provider</label>
      <select id="provider">
        <option value="anthropic">Anthropic (Claude)</option>
        <option value="openai">OpenAI (GPT)</option>
        <option value="google">Google (Gemini)</option>
        <option value="groq">Groq</option>
        <option value="openrouter">OpenRouter</option>
        <option value="local">Local LLM (Ollama / LM Studio)</option>
        <option value="custom">Custom OpenAI-compatible</option>
      </select>

      <label>API Key</label>
      <input type="password" id="apiKey" placeholder="sk-ant-..." />

      <div id="custom-url-section" class="hidden">
        <label>Base URL</label>
        <input type="text" id="baseUrl" placeholder="http://localhost:11434/v1/chat/completions" />
      </div>

      <label>Model (optional)</label>
      <input type="text" id="model" placeholder="Leave empty for default" />

      <button id="btn-save" class="btn-primary">Save Settings</button>
      <button id="btn-test" class="btn-secondary">🧪 Test Connection</button>
      <div id="status"></div>
    </div>

    <div class="card">
      <h2>📦 Data</h2>
      <p id="stats"></p>
      <button id="btn-export" class="btn-secondary">📥 Export Bookmarks (JSON)</button>
      <button id="btn-import" class="btn-secondary">📤 Import Bookmarks</button>
      <input type="file" id="file-import" accept=".json" class="hidden" />
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
